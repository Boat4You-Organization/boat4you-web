# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2

      # Runs a single command using the runners shell
      - name: Run lint, test and build commands
        env:
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_WORDPRESS_API_URL: ${{ secrets.NEXT_PUBLIC_WORDPRESS_API_URL }}
          NEXT_PUBLIC_BOAT_WS_API_URL: ${{ secrets.NEXT_PUBLIC_BOAT_WS_API_URL }}
          NEXT_PUBLIC_STRIPE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_KEY }}
          NEXT_PUBLIC_BOAT_WS_GAID: ${{ secrets.NEXT_PUBLIC_BOAT_WS_GAID }}
          NODEMAILER_USERNAME: ${{ secrets.NODEMAILER_USERNAME }}
          NODEMAILER_PASSWORD: ${{ secrets.NODEMAILER_PASSWORD }}
        run: yarn && yarn lint && yarn build
