<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a2540" />
    <title>You're offline · Boat4You</title>
    <link rel="icon" href="/favicons/favicon.ico" />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0a2540;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .card {
        max-width: 440px;
      }
      img {
        width: 72px;
        height: 72px;
        margin-bottom: 24px;
      }
      h1 {
        font-size: 24px;
        font-weight: 600;
        margin: 0 0 12px;
      }
      p {
        font-size: 16px;
        line-height: 1.6;
        color: #c8d4e0;
        margin: 0 0 28px;
      }
      button {
        font: inherit;
        font-weight: 600;
        color: #0a2540;
        background: #f0c34f;
        border: 0;
        border-radius: 10px;
        padding: 14px 28px;
        cursor: pointer;
      }
      button:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/favicons/android-chrome-192x192.png" alt="Boat4You" />
      <h1 id="t">You're offline</h1>
      <p id="b">
        We can't reach Boat4You right now. Check your connection — yacht availability and prices need to load live.
      </p>
      <button id="r" onclick="location.reload()">Try again</button>
    </div>
    <script>
      (function () {
        var T = {
          en: {
            t: "You're offline",
            b: "We can't reach Boat4You right now. Check your connection — yacht availability and prices need to load live.",
            r: 'Try again',
          },
          hr: {
            t: 'Niste povezani',
            b: 'Trenutačno ne možemo doći do Boat4You. Provjerite vezu — dostupnost plovila i cijene moraju se učitati uživo.',
            r: 'Pokušaj ponovno',
          },
          de: {
            t: 'Du bist offline',
            b: 'Boat4You ist gerade nicht erreichbar. Prüfe deine Verbindung — Verfügbarkeit und Preise werden live geladen.',
            r: 'Erneut versuchen',
          },
          fr: {
            t: 'Vous êtes hors ligne',
            b: 'Boat4You est injoignable pour le moment. Vérifiez votre connexion — la disponibilité et les prix se chargent en direct.',
            r: 'Réessayer',
          },
          it: {
            t: 'Sei offline',
            b: 'Al momento non riusciamo a raggiungere Boat4You. Controlla la connessione — disponibilità e prezzi si caricano in tempo reale.',
            r: 'Riprova',
          },
          es: {
            t: 'Estás sin conexión',
            b: 'Ahora mismo no podemos acceder a Boat4You. Comprueba tu conexión — la disponibilidad y los precios se cargan en directo.',
            r: 'Reintentar',
          },
          pt: {
            t: 'Está offline',
            b: 'De momento não conseguimos aceder ao Boat4You. Verifique a ligação — a disponibilidade e os preços carregam em direto.',
            r: 'Tentar novamente',
          },
          pl: {
            t: 'Jesteś offline',
            b: 'Nie możemy teraz połączyć się z Boat4You. Sprawdź połączenie — dostępność i ceny ładują się na żywo.',
            r: 'Spróbuj ponownie',
          },
          nl: {
            t: 'Je bent offline',
            b: 'We kunnen Boat4You nu niet bereiken. Controleer je verbinding — beschikbaarheid en prijzen worden live geladen.',
            r: 'Opnieuw proberen',
          },
        };
        var m = document.cookie.match(/(?:^|; )NEXT_LOCALE=([a-z]{2})/);
        var l = (m && m[1]) || (navigator.language || 'en').slice(0, 2).toLowerCase();
        var d = T[l] || T.en;
        document.documentElement.lang = T[l] ? l : 'en';
        document.title = d.t + ' · Boat4You';
        document.getElementById('t').textContent = d.t;
        document.getElementById('b').textContent = d.b;
        document.getElementById('r').textContent = d.r;
      })();
    </script>
  </body>
</html>
