<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a2540" />
    <title>You're offline · Boat4You</title>
    <link rel="icon" href="/favicons/favicon.ico" />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0a2540;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .card {
        max-width: 420px;
      }
      img {
        width: 72px;
        height: 72px;
        margin-bottom: 24px;
      }
      h1 {
        font-size: 24px;
        font-weight: 600;
        margin: 0 0 12px;
      }
      p {
        font-size: 16px;
        line-height: 1.6;
        color: #c8d4e0;
        margin: 0 0 28px;
      }
      button {
        font: inherit;
        font-weight: 600;
        color: #0a2540;
        background: #f0c34f;
        border: 0;
        border-radius: 10px;
        padding: 14px 28px;
        cursor: pointer;
      }
      button:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/favicons/android-chrome-192x192.png" alt="Boat4You" />
      <h1>You're offline</h1>
      <p>We can't reach Boat4You right now. Check your connection — yacht availability and prices need to load live.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
