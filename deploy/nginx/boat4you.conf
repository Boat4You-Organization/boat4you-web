server {
    root /var/www/admin.boat4you.com/html;
    index index.html index.htm index.nginx-debian.html;

    server_name admin.boat4you.com;

    location / {
        try_files $uri /index.html =404;
    }

    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/admin.boat4you.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/admin.boat4you.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    server_name www.boat4you.com;

    # Google Site Verification (service-account claude-seo, 2026-06-11) —
    # served at the edge so the SA can self-verify GSC ownership; the same
    # file is also committed to the repo's public/ for durability.
    location = /google77c1a7061dbbb424.html {
        default_type text/plain;
        return 200 "google-site-verification: google77c1a7061dbbb424.html";
    }

    # 301 retired blog posts -> closest current guide (GSC 404 cleanup, link equity)
    location ~ ^(/(?:fr|de|it|es|pt|nl|pl|hr))?/blog/what-is-a-boat-hostess/?$ { return 301 $1/blog/a-day-in-the-life-on-a-charter-yacht; }
    location ~ ^(/(?:fr|de|it|es|pt|nl|pl|hr))?/blog/the-ultimate-guide-to-sailing-north-dalmatia/?$ { return 301 $1/blog/croatia-sailing-guide-2026; }
    location ~ ^(/(?:fr|de|it|es|pt|nl|pl|hr))?/blog/is-a-security-deposit-required-for-renting-a-yacht/?$ { return 301 $1/blog/yacht-charter-cost-2026-full-breakdown; }
    location ~ ^(/(?:fr|de|it|es|pt|nl|pl|hr))?/blog/what-insurance-is-needed-for-a-yacht-charter-in-croatia-and-greece/?$ { return 301 $1/blog/yacht-charter-cost-2026-full-breakdown; }


    # De-WordPress: serve WP media under the main domain so wp.boat4you.com
    # never appears in blog HTML (FE rewrites all WP URLs in lib/api).
    location /wp-content/ {
        # Resolve the WP upstream at REQUEST time (variable + resolver), not at
        # config load. With a literal hostname nginx resolves it during startup/
        # config test, so a transient DNS blip takes the whole server down --
        # exactly the 2026-06-10 outage (apt-daily restarted networkd mid
        # certbot/nginx restart; "host not found in upstream wp.boat4you.com"
        # kept nginx failed for ~6 min). Worst case now: only /wp-content/
        # requests 502 during a blip; the site itself stays up.
        resolver 127.0.0.53 1.1.1.1 valid=300s ipv6=off;
        set $wp_upstream wp.boat4you.com;
        proxy_pass https://$wp_upstream;
        proxy_set_header Host wp.boat4you.com;
        proxy_ssl_server_name on;
        proxy_hide_header Set-Cookie;
    }


    location / {
        proxy_pass http://127.0.0.1:3001;
        #proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (safe to include)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Helpful timeouts
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/www.boat4you.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/www.boat4you.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot



}
server {
    if ($host = admin.boat4you.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot



    server_name admin.boat4you.com;


    listen 80;
    return 404; # managed by Certbot


}


server {
    if ($host = boat4you.com) {
        return 301 https://www.boat4you.com$request_uri;
    } # managed by Certbot


    server_name boat4you.com;


    listen 80;
    return 404; # managed by Certbot


}

# Apex -> www canonical 301 (added 2026-06-11): Google was indexing both hosts.
server {
    listen 443 ssl http2;
    server_name boat4you.com;
    ssl_certificate /etc/letsencrypt/live/www.boat4you.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.boat4you.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://www.boat4you.com$request_uri;
}
